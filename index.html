<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>7号楼·平凡人的责任</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }

    .container {
      max-width: 640px; margin: 0 auto; position: relative;
      width: 100%; height: 100vh; overflow: hidden;
    }

    /* Progress bar */
    .progress-bar {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
      background: linear-gradient(90deg, #c8a050, #e8c870);
      transition: width 0.6s ease;
    }

    /* Scene base */
    .scene {
      width: 100%; aspect-ratio: 640/1040; position: relative;
      overflow: hidden; background: #000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s ease;
      position: absolute; top: 0; left: 0;
    }
    .scene.active {
      opacity: 1; pointer-events: auto;
    }

    .layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .layer img {
      position: absolute; display: block; max-width: none;
    }

    /* Click overlay - always on top, transparent, reliable */
    .click-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 100; cursor: pointer;
    }
    .click-overlay.hidden { display: none; }

    /* Finger bounce animation */
    @keyframes fingerBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .finger-anim { animation: fingerBounce 1.2s ease-in-out infinite; }

    /* Click hint blink */
    @keyframes hintBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .hint-blink { animation: hintBlink 1.2s ease-in-out infinite; }

    /* Cover tree open animation */
    .tree-left { transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .tree-left.open { transform: translateX(-100%); }
    .tree-right { transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .tree-right.open { transform: translateX(100%); }

    /* Cover black mask fade */
    .cover-mask { transition: opacity 1.5s ease; }
    .cover-mask.fade { opacity: 0; }

    /* Mask overlay for interior dark scenes */
    .mask-overlay {
      transition: opacity 1s ease;
    }
    .mask-overlay.fade { opacity: 0; pointer-events: none; }

    /* Responsibility card slide in from right */
    @keyframes cardSlideRight {
      0% { transform: translateX(100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    /* Responsibility card slide in from left */
    @keyframes cardSlideLeft {
      0% { transform: translateX(-100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    .card-slide-right { animation: cardSlideRight 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .card-slide-left { animation: cardSlideLeft 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* Baby crib rocking */
    @keyframes cribRock {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    .crib-rock { animation: cribRock 2s ease-in-out infinite; transform-origin: center bottom; }

    /* Arm breathing rotation */
    @keyframes armBreath {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .arm-breath { animation: armBreath 3s ease-in-out infinite; }

    /* Phone shake */
    @keyframes phoneShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
    .phone-shake { animation: phoneShake 0.1s linear infinite; }

    /* Cat tail swing */
    @keyframes catTail {
      0%, 100% { transform: rotate(-15deg); }
      50% { transform: rotate(15deg); }
    }

    /* Light glow pulse */
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .glow-pulse { animation: glowPulse 2s ease-in-out infinite; }

    /* Window glow pulse for clickable windows */
    @keyframes windowGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    .window-glow { animation: windowGlow 2s ease-in-out infinite; }

    /* Bubble text appear */
    @keyframes bubbleAppear {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .bubble-appear { animation: bubbleAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* Scene title hidden */
    .scene-title { display: none; }

    /* Arrow pulse */
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .arrow-pulse { animation: arrowPulse 2s ease-in-out infinite; }

    /* Ending scene */
    .ending-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 50;
    }
    .ending-title {
      color: #fff; font-size: 28px; font-weight: bold;
      text-shadow: 0 0 20px rgba(200,160,80,0.5);
      margin-bottom: 10px; opacity: 0;
      animation: fadeInUp 1s ease 0.3s forwards;
    }
    .ending-subtitle {
      color: rgba(255,255,255,0.6); font-size: 14px;
      margin-bottom: 30px; opacity: 0;
      animation: fadeInUp 1s ease 0.6s forwards;
    }
    .poster-btn {
      background: linear-gradient(135deg, #c8a050, #a08030);
      color: #fff; border: none; padding: 14px 36px;
      border-radius: 30px; font-size: 16px; cursor: pointer;
      letter-spacing: 0.1em;
      box-shadow: 0 4px 15px rgba(160,128,48,0.4);
      opacity: 0; animation: fadeInUp 1s ease 1s forwards;
    }
    .poster-btn:active { transform: scale(0.95); }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ========== NEW ANIMATIONS ========== */
    /* 1. Cloud / canopy gentle sway */
    @keyframes cloudSway {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }
    .cloud-sway { animation: cloudSway 3s ease-in-out infinite; }

    /* 2. Father stirring milk powder (small circular motion around elbow) */
    @keyframes stirMotion {
      0% { transform: rotate(0deg) translateX(0); }
      25% { transform: rotate(3deg) translateX(2px); }
      50% { transform: rotate(0deg) translateX(4px); }
      75% { transform: rotate(-3deg) translateX(2px); }
      100% { transform: rotate(0deg) translateX(0); }
    }
    .stir-motion { animation: stirMotion 1.5s ease-in-out infinite; transform-origin: 80% 20%; }

    /* 3. Mother cradling baby (gentle arc) */
    @keyframes cradleRock {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      33% { transform: rotate(2deg) translateY(-2px); }
      66% { transform: rotate(-1deg) translateY(0); }
    }
    .cradle-rock { animation: cradleRock 2.5s ease-in-out infinite; transform-origin: 70% 10%; }

    /* 4. Cleaner body breathing sway */
    @keyframes bodyBreath {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.005) translateY(-1px); }
    }
    .body-breath { animation: bodyBreath 2s ease-in-out infinite; transform-origin: center bottom; }

    /* 5. Clothes hanging sway (pivot from hook) */
    @keyframes clothesSway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(4deg); }
    }
    .clothes-sway { animation: clothesSway 2s ease-in-out infinite; transform-origin: 50% 0; }

    /* 6. Plants elastic swing */
    @keyframes plantSwing {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(6deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(-4deg); }
    }
    .plant-swing { animation: plantSwing 2.5s ease-in-out infinite; transform-origin: 50% 100%; }
    .plant-swing-fast { animation: plantSwing 1.2s ease-in-out infinite; transform-origin: 50% 100%; }

    /* 7. Hand extend for trash handover */
    @keyframes handExtend {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(15px); }
    }
    .hand-extend { animation: handExtend 2s ease-in-out infinite; }

    /* 8. Boy pushing toy back-and-forth */
    @keyframes toyPush {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(12px); }
    }
    .toy-push { animation: toyPush 1s ease-in-out infinite; }

    /* 9. Phone holding slight sway */
    @keyframes phoneHold {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      33% { transform: rotate(1deg) translateY(-1px); }
      66% { transform: rotate(-1deg) translateY(1px); }
    }
    .phone-hold { animation: phoneHold 2s ease-in-out infinite; }

    /* 10. Salute / wave */
    @keyframes salute {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-8deg); }
    }
    .salute { animation: salute 1.5s ease-in-out infinite; transform-origin: 80% 90%; }

    /* 11. Bag bobbing */
    @keyframes bagBob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(3px) rotate(1deg); }
    }
    .bag-bob { animation: bagBob 2s ease-in-out infinite; }
    .bag-bob-strong { animation: bagBob 0.8s ease-in-out infinite; }

    /* 12. Braids swinging */
    @keyframes braidSwingLeft {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(6deg); }
    }
    @keyframes braidSwingRight {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-6deg); }
    }
    .braid-left { animation: braidSwingLeft 1.5s ease-in-out infinite; transform-origin: 80% 0; }
    .braid-right { animation: braidSwingRight 1.5s ease-in-out infinite; transform-origin: 20% 0; }
    .braid-left-fast { animation: braidSwingLeft 0.6s ease-in-out infinite; transform-origin: 80% 0; }
    .braid-right-fast { animation: braidSwingRight 0.6s ease-in-out infinite; transform-origin: 20% 0; }

    /* 13. Knock arm */
    @keyframes knockArm {
      0%, 100% { transform: rotate(0deg); }
      30% { transform: rotate(-15deg); }
      60% { transform: rotate(0deg); }
      80% { transform: rotate(-10deg); }
    }
    .knock-arm { animation: knockArm 1s ease-in-out; transform-origin: 10% 90%; }

    /* 14. Arms open */
    @keyframes armsOpen {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-20deg); }
    }
    .arms-open-action { animation: armsOpen 0.6s ease-out forwards; transform-origin: 90% 90%; }

    /* 15. Shiver / tremble */
    @keyframes shiver {
      0%, 100% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(-1px) translateY(1px); }
      50% { transform: translateX(1px) translateY(0); }
      75% { transform: translateX(0) translateY(-1px); }
    }
    .shiver { animation: shiver 0.3s linear infinite; }

    /* 16. Wipe sweat */
    @keyframes wipeSweat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-3px) rotate(3deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-2px) rotate(-2deg); }
    }
    .wipe-sweat { animation: wipeSweat 1.2s ease-in-out infinite; transform-origin: 20% 80%; }

    /* 17. Hand water pass */
    @keyframes handWater {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(8px); }
    }
    .hand-water { animation: handWater 2s ease-in-out infinite; }

    /* Poster result */
    .poster-result {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 1000; display: none; align-items: center;
      justify-content: center; flex-direction: column;
    }
    .poster-result.show { display: flex; }
    .poster-canvas { max-width: 90%; max-height: 70%; border-radius: 8px; box-shadow: 0 0 30px rgba(255,200,100,0.3); }
    .poster-actions { margin-top: 16px; display: flex; gap: 16px; }
    .poster-action-btn {
      color: #fff; font-size: 14px;
      background: rgba(255,255,255,0.15);
      padding: 8px 24px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.3); cursor: pointer;
    }
  </style>
</head>

<script>
// ============ STATE ============
let currentScene = 1;
let interacted = {};
const TOTAL_SCENES = 18;

// ============ AUDIO ============
function stopAllAudio() {
  ['audio-cry', 'audio-opera', 'audio-phone'].forEach(id => {
    const a = document.getElementById(id);
    if (a) { a.pause(); a.currentTime = 0; }
  });
}
function unlockAudio() {
  ['audio-cry', 'audio-opera', 'audio-phone'].forEach(id => {
    const a = document.getElementById(id);
    if (a) { a.play().then(() => a.pause()).catch(() => {}); }
  });
}
function playAudio(id) {
  const a = document.getElementById(id);
  if (a) a.play().catch(() => {});
}
function stopAudio(id) {
  const a = document.getElementById(id);
  if (a) { a.pause(); a.currentTime = 0; }
}

// Scene flow: each scene leads to the next
// Special: interior dark -> interior bright (skip one)
// 1(Cover) -> 2(Ext-Night) -> 3(Int-Dark) -> 4(Int-Bright) -> 5(Ext-Dawn) ->
// 6(Int-Dark) -> 7(Int-Bright) -> 8(Ext-Morning) -> 9(Int-Dark) -> 10(Int-Bright) ->
// 11(Ext-Noon) -> 12(Int-Dark) -> 13(Int-Bright) -> 14(Ext-Rain) ->
// 15(Int-Dark) -> 16(Int-Bright) -> 17(Ext-NightRain) -> 18(Ext-LateNight) -> ending

// ============ SCENE MANAGEMENT ============
function showScene(id) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('scene-' + id);
  if (el) {
    el.classList.add('active');
    currentScene = id;
    updateProgress();
    onSceneEnter(id);
  }
}

function updateProgress() {
  const pct = ((currentScene - 1) / (TOTAL_SCENES + 1)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

// ============ SCENE ENTER HANDLERS ============
function onSceneEnter(id) {
  switch(id) {
    case 1: initCover(); break;
    case 2: initExtNight(); break;
    case 3: initBedroomDark(); break;
    case 4: initBedroomBright(); break;
    case 5: initExtDawn(); break;
    case 6: initEntrywayDark(); break;
    case 7: initEntrywayBright(); break;
    case 8: initExtMorning(); break;
    case 9: initLivingRoomDark(); break;
    case 10: initLivingRoomBright(); break;
    case 11: initExtNoon(); break;
    case 12: initDoorDark(); break;
    case 13: initDoorBright(); break;
    case 14: initExtRain(); break;
    case 15: initDeliveryDark(); break;
    case 16: initDeliveryBright(); break;
    case 17: initExtNightRain(); break;
    case 18: initExtLateNight(); break;
    case 'ending': initEnding(); break;
  }
}

// ============ COVER (Scene 1) ============
function initCover() {
  const overlay = document.getElementById('click1');
  if (overlay) {
    overlay.onclick = function() {
      if (interacted[1]) return;
      interacted[1] = true;

// ============ POSTER GENERATION ============
function generatePoster() {
  const canvas = document.getElementById('posterCanvas');
  const w = 600, h = 900;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0b1026');
  grad.addColorStop(0.5, '#1a1a3e');
  grad.addColorStop(1, '#2d1b3d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Stars
  for (let i = 0; i < 60; i++) {
    ctx.beginPath();
    ctx.arc(Math.random()*w, Math.random()*h*0.5, Math.random()*1.5+0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,' + (Math.random()*0.6+0.2) + ')';
    ctx.fill();
  }

  // Building
  const bx = w*0.2, by = h*0.3, bw = w*0.6, bh = h*0.45;
  ctx.fillStyle = '#6b2a2a';
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = '#8b3a3a';
  ctx.fillRect(bx-4, by-8, bw+8, 12);

  // Windows (all lit)
  const winColors = [[true,true,true,true],[true,true,true,true],[true,true,true,true],[true,true,true,true]];
  for (let f = 0; f < 4; f++) {
    for (let wi = 0; wi < 4; wi++) {
      const wx = bx + bw*0.08 + wi*(bw*0.22);
      const wy = by + bh*0.08 + f*(bh*0.22);
      const ww = bw*0.16, wh = bh*0.16;
      if (winColors[f] && winColors[f][wi]) {
        ctx.fillStyle = '#ffd866';
        ctx.shadowColor = 'rgba(255,200,50,0.5)';
        ctx.shadowBlur = 15;
      } else {
        ctx.fillStyle = '#1a1a2a';
        ctx.shadowBlur = 0;
      }
      ctx.fillRect(wx, wy, ww, wh);
      ctx.shadowBlur = 0;
    }
  }

  // Ground
  ctx.fillStyle = '#2a2a1a';
  ctx.fillRect(0, by+bh, w, h-by-bh);

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('7号楼', w/2, h*0.15);

  // Subtitle
  ctx.font = '20px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('平凡人的责任', w/2, h*0.2);

  // Bottom text
  ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const quotes = [
    '每一盏灯，都是一个平凡人的责任',
    '7号楼·平凡人的责任 1949-2019',
    '责任在心，担当于行'
  ];
  quotes.forEach((q, i) => {
    ctx.fillText(q, w/2, h*0.85 + i*24);
  });

  // Decorative line
  ctx.strokeStyle = 'rgba(200,160,80,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w*0.3, h*0.82);
  ctx.lineTo(w*0.7, h*0.82);
  ctx.stroke();

  document.getElementById('posterResult').classList.add('show');
}

// Close poster
document.getElementById('posterClose').onclick = function() {
  document.getElementById('posterResult').classList.remove('show');
};

// ============ ADAPTIVE SCALING ============
function adaptScale() {
  const container = document.querySelector('.container');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const designW = 640;
  const designH = 1040;
  const scaleW = vw / designW;
  const scaleH = vh / designH;
  const scale = Math.min(scaleW, scaleH);
  container.style.transform = 'scale(' + scale + ')';
  container.style.transformOrigin = 'top center';
  container.style.width = designW + 'px';
  container.style.height = designH + 'px';
  // Center horizontally
  const offsetX = (vw - designW * scale) / 2;
  container.style.marginLeft = offsetX + 'px';
}

window.addEventListener('resize', adaptScale);
adaptScale();
